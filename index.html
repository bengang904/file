<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>文件</title>
<style>
    :root {
        --primary-color: #007bff;
        --bg-light: #f4f7f9;
        --bg-white: #ffffff;
        --text-dark: #333333;
        --text-secondary: #6c757d;
        --card-shadow-initial: 0 4px 12px rgba(0, 0, 0, 0.08);
        --card-shadow-hover: 0 8px 20px rgba(0, 0, 0, 0.15);
        --border-radius-base: 10px;
        --transition-speed: 0.3s;
        --max-content-width: 1000px;
        --min-card-width: 220px;
        --grid-gap: 20px;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Noto Sans SC', system-ui, sans-serif;
        font-size: 16px;
        line-height: 1.6;
        color: var(--text-dark);
        background: var(--bg-light);
        padding: 40px 20px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
    }

    #main-container {
        width: 100%;
        max-width: var(--max-content-width);
        margin: 0 auto;
    }

    #grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(var(--min-card-width), 1fr));
        gap: var(--grid-gap);
        width: 100%;
        justify-items: center;
    }

    @media (max-width: 768px) {
        #grid {
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
    }

    @media (max-width: 500px) {
        #grid {
            grid-template-columns: 1fr;
            gap: 15px;
        }
        body {
            padding: 20px 15px;
        }
    }

    .card {
        background: var(--bg-white);
        border-radius: var(--border-radius-base);
        padding: 0;
        overflow: hidden;
        box-shadow: var(--card-shadow-initial);
        cursor: pointer;
        transition: transform var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
        text-align: left;
        border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .card:hover {
        transform: translateY(-4px);
        box-shadow: var(--card-shadow-hover);
    }

    .card-content {
        padding: 12px;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .cover-wrapper {
        width: 100%;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        background: #e9ecef;
    }

    .cover-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform var(--transition-speed) ease;
    }

    .card:hover .cover-img {
        transform: scale(1.05);
    }

    .title {
        margin-top: 0;
        font-size: 1em;
        font-weight: 700;
        color: var(--text-dark);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .desc {
        font-size: 0.85em;
        color: var(--text-secondary);
        margin-top: 5px;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
        height: 2.6em;
    }

    #grid.error {
        color: #dc3545;
        font-weight: bold;
        text-align: center;
        padding: 50px;
        grid-column: 1 / -1;
    }
</style>
</head>
<body>
<div id="main-container">
    <div id="grid"></div>
</div>

<script>
const grid = document.getElementById("grid");
const params = new URLSearchParams(location.search);
const jsonURL = params.get("json") || "list.json";

async function loadList() {
    grid.innerHTML = "";
    grid.classList.remove('error');

    try {
        const res = await fetch(jsonURL);
        if (!res.ok) {
            throw new Error(`无法加载 JSON (状态码: ${res.status})`);
        }

        const list = await res.json();
        if (!Array.isArray(list)) {
            throw new Error("JSON 格式错误，期望数组");
        }

        render(list);
    } catch (err) {
        grid.innerHTML = `加载失败：${err.message}。请检查 json URL 或文件是否存在。`;
        grid.classList.add('error');
    }
}

function render(list) {
    grid.innerHTML = "";
    if (list.length === 0) {
        grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-secondary);">暂无资源可用。</p>`;
        return;
    }

    list.forEach((item, index) => {
        const title = item.title || `未命名资源 ${index + 1}`;
        const desc = item.desc || "暂无描述信息";
        const cover = item.cover || "placeholder.svg";
        const file = item.file || "#";

        const card = document.createElement("div");
        card.className = "card";
        card.setAttribute('data-index', index);

        card.onclick = () => {
            if (file !== "#") {
                window.open(`look.html?url=${encodeURIComponent(file)}`, "_blank");
            } else {
                alert("资源文件路径未定义！");
            }
        };

        card.innerHTML = `
            <div class="cover-wrapper" role="img" aria-label="${title} 的封面图">
                <img class="cover-img" src="${cover}" alt="${title} 封面">
            </div>
            <div class="card-content">
                <div class="title" title="${title}">${title}</div>
                <div class="desc">${desc}</div>
            </div>
        `;

        grid.appendChild(card);
    });
}

document.addEventListener('DOMContentLoaded', loadList);
</script>

</body>
</html>
